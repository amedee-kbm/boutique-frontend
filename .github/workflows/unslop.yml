name: unslop-ui

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # Exit code = number of HIGH-severity AI-default tells; fail the build on any.
      - run: python3 scripts/devibe_scan.py ./components --severity high
      - run: python3 scripts/devibe_scan.py ./app --severity high
