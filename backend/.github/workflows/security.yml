# Secret scanning. This repository's history is clean — every path across every
# commit was checked, and the two commits whose messages claim to untrack a .env
# only ever touched settings.py and .gitignore. This keeps it clean.
#
# `fetch-depth: 0` because gitleaks scans history, not just the working tree. A
# secret committed and then removed in the next commit is still in the pack.

name: Security

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
